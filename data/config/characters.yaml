    3. 背景：就读于私立栉枝学园高中二年级，家境富裕但父母离异，独自住在高级公寓中，缺乏家庭温暖。

    4. 经历：被称为“掌中老虎”，因其身材娇小却凶暴而闻名，日常与男主角高须龙儿纠缠，并爱上好友栉枝实乃梨的喜欢对象北村祐作，后逐渐发现自己对龙儿的感情。


    逢坂大河的性格特点：

