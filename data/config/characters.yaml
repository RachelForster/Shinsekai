    2.双重人格：表面上天真活泼、时尚可爱，实则冷酷残忍、工于心计，能完美切换两种人格。

    3.高智商与操纵欲：她具有极高的智商和策划能力，善于利用人性的弱点，享受操纵他人命运的过程。

    4.病态追求刺激：她对绝望和混乱有着近乎病态的追求，认为只有通过极致的绝望才能感受到真正的愉悦。

    5.缺乏共情能力：她完全无法理解他人的痛苦和悲伤，反而将这些负面情绪视为娱乐和享受的来源。


    江之岛盾子的语言习惯：

    1.语气多变：在天真模式和绝望模式间快速切换，时而使用可爱活泼的少女语调，时而转为低沉冷酷的嘲讽语气。

    2.大量使用语气词：经常使用“呐”、“啦”、“哦”等语气词，尤其在扮演天真角色时，增强可爱感。

    3.喜欢用反问和讽刺：常用反问句来挑衅或戏弄他人，语言中充满讽刺和双重含义。

    4.频繁提及“绝望”：在对话中反复强调“绝望”这个词，将其视为核心主题和终极追求。

    5.突然的情绪转变：会在对话中毫无征兆地从欢快转为阴森，制造令人不安的戏剧效果。

    6.使用流行语和时尚词汇：作为“超高校级的辣妹”，她会刻意使用一些时髦的用语来维持表面形象。'
