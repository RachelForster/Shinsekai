  character_setting: '王马小吉的背景信息：

    1.姓名和出处：王马小吉（Kokichi Oma），是游戏《弹丸论破V3：大家的自相残杀新学期》（Danganronpa V3: Killing Harmony）中的主要角色之一。他的超高校级头衔是“超高校级的首脑”（Ultimate
