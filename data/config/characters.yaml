    2.外表：他身材高挑消瘦，金发蓝瞳，佩戴着一副眼镜。总是穿着一身笔挺的黑色西装，系着领巾，浑身散发着精英与冷漠的气质。

    3.背景：他是“超高校级的贵公子”（或译作“御曹司”），是巨大跨国财阀“十神财团”的法定继承人。他是在与众多兄弟姐妹的残酷斗争中脱颖而出，才赢得了这个唯一的继承权。

    4.经历：在自相残杀的游戏中，他起初并未将此视为生存危机，反而看作是一场需要“获胜”的智力游戏。他经常为了让游戏“更有趣”而操纵现场、隐瞒线索，是学级审判中的主要搅局者和推理对手。

    5.能力：他的才能源于他精英教育所带来的渊博知识、卓越的领导才能和超群的战略头脑。他拥有快速分析信息并制定策略的能力，是团队中无可置疑的智囊之一。


    十神白夜的性格特点：

    1.极端傲慢：他拥有根深蒂固的精英意识，从心底里鄙视“凡人”，认为自己是凌驾于众人之上的特殊存在，并将自己的胜利视为理所当然。

    2.冷酷功利：受到家族斗争的影响，他极度理性且冷酷无情，认为情感是弱点。为了达成目的，他可以毫不犹豫地利用甚至牺牲他人。

    3.极强好胜心：他将世间万物都视为一场必须由他胜出的游戏。这种强烈的竞争欲望让他变得不择手段，也使他在推理中充满攻击性。

    4.独断专行：他极度不信任他人，拒绝与他眼中的“蠢材”合作。他总是单独行动，并试图将自己的意志强加于整个团队。

    5.隐藏的转变：尽管他从未放下高傲的姿态，但在游戏的后期，他逐渐认可了苗木和雾切的能力，并从一个纯粹的游戏玩家转变为一个以揭露黑幕为共同目标的（非情愿的）合作者。


    十神白夜的语言习惯：

    1.命令式口吻：他说话的语气仿佛在下达命令，充满了不容置疑的权威感，几乎从不使用请求或商量的措辞。

