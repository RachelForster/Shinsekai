name: Release cherry-pick status

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Update linked release bug status
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          repo = os.environ["REPO"]
          owner, name = repo.split("/", 1)
          pr_number = int(os.environ["PR_NUMBER"])
          pr_title = os.environ.get("PR_TITLE") or ""
          pr_body = os.environ.get("PR_BODY") or ""
          pr_base = os.environ["PR_BASE"]
          pr_url = os.environ["PR_URL"]
          merge_sha = os.environ.get("MERGE_SHA") or ""

          def gh_api(*args: str, input_json: dict | None = None, check: bool = True) -> str:
              command = ["gh", "api", *args]
              payload = None if input_json is None else json.dumps(input_json)
              result = subprocess.run(
                  command,
                  input=payload,
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
              )
              if check and result.returncode != 0:
                  print(result.stderr, file=sys.stderr)
                  raise SystemExit(result.returncode)
              return result.stdout

          def fetch_issue(number: int) -> dict:
              return json.loads(gh_api(f"repos/{repo}/issues/{number}"))

          def fetch_parent_issue(number: int) -> dict | None:
              result = subprocess.run(
                  ["gh", "api", f"repos/{repo}/issues/{number}/parent"],
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
              )
              if result.returncode == 0:
                  return json.loads(result.stdout)
              if "not found" in result.stderr.lower() or "404" in result.stderr:
                  return None
              print(result.stderr, file=sys.stderr)
              raise SystemExit(result.returncode)

          def collect_issue_numbers() -> list[int]:
              text = f"{pr_title}\n{pr_body}"
              numbers: list[int] = []
              seen: set[int] = set()
              patterns = [
                  rf"https://github\.com/{re.escape(owner)}/{re.escape(name)}/issues/(\d+)",
                  rf"(?<![\w/-]){re.escape(owner)}/{re.escape(name)}#(\d+)\b",
                  r"(?<![\w/-])#(\d+)\b",
              ]
              for pattern in patterns:
                  for match in re.finditer(pattern, text, flags=re.IGNORECASE):
                      number = int(match.group(1))
                      if number == pr_number or number in seen:
                          continue
                      numbers.append(number)
                      seen.add(number)
              return numbers

          def labels(issue: dict) -> set[str]:
              return {label["name"].lower() for label in issue.get("labels", [])}

          def is_release_bug(issue: dict) -> bool:
              issue_labels = labels(issue)
              title = issue.get("title") or ""
              return (
                  "release-blocker" in issue_labels
                  or "needs-fix" in issue_labels
                  or "needs-cherrypick" in issue_labels
                  or "cherry-picked" in issue_labels
                  or title.startswith("[RC ")
              )

          def add_labels(issue_number: int, names: list[str]) -> None:
              if not names:
                  return
              gh_api(
                  f"repos/{repo}/issues/{issue_number}/labels",
                  "--method",
                  "POST",
                  "--input",
                  "-",
                  input_json={"labels": names},
              )

          def remove_label(issue_number: int, name: str) -> None:
              result = subprocess.run(
                  ["gh", "api", f"repos/{repo}/issues/{issue_number}/labels/{name}", "--method", "DELETE"],
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
              )
              if result.returncode in (0,):
                  return
              if "not found" in result.stderr.lower() or "404" in result.stderr:
                  return
              print(result.stderr, file=sys.stderr)
              raise SystemExit(result.returncode)

          def set_issue_state(issue_number: int, state: str) -> None:
              gh_api(
                  f"repos/{repo}/issues/{issue_number}",
                  "--method",
                  "PATCH",
                  "--input",
                  "-",
                  input_json={"state": state},
              )

          def update_field(body: str, field: str, value: str) -> str:
              pattern = rf"(- {re.escape(field)}:\s*)(.*)"
              replacement = rf"\g<1>{value}"
              if re.search(pattern, body, flags=re.IGNORECASE):
                  return re.sub(pattern, replacement, body, count=1, flags=re.IGNORECASE)
              return body.rstrip() + f"\n- {field}: {value}\n"

          def patch_body(issue: dict, updates: dict[str, str]) -> None:
              body = issue.get("body") or ""
              next_body = body
              for field, value in updates.items():
                  next_body = update_field(next_body, field, value)
              if next_body != body:
                  gh_api(
                      f"repos/{repo}/issues/{issue['number']}",
                      "--method",
                      "PATCH",
                      "--input",
                      "-",
                      input_json={"body": next_body},
                  )

          def issue_severity(issue: dict) -> str:
              issue_labels = labels(issue)
              for severity in ("p0", "p1", "p2", "p3"):
                  if severity in issue_labels:
                      return severity.upper()
              body = issue.get("body") or ""
              for severity in ("P0", "P1", "P2", "P3"):
                  if re.search(rf"- \[[xX ]\]\s+{severity}\b", body):
                      return severity
              return "TBD"

          def issue_owner(issue: dict) -> str:
              assignees = issue.get("assignees") or []
              if assignees:
                  return ", ".join(f"@{assignee['login']}" for assignee in assignees)
              return "TBD"

          def issue_status(issue: dict) -> str:
              if issue.get("state") == "closed":
                  return "closed"
              issue_labels = labels(issue)
              if "cherry-picked" in issue_labels:
                  return "cherry-picked"
              if "needs-cherrypick" in issue_labels:
                  return "needs cherrypick"
              if "fixed-on-main" in issue_labels:
                  return "fixed on main"
              if "needs-fix" in issue_labels:
                  return "needs fix"
              return "open"

          def parse_fix_field(issue: dict, field: str) -> str:
              body = issue.get("body") or ""
              match = re.search(rf"{re.escape(field)}\s*:\s*(.+)", body, flags=re.IGNORECASE)
              if not match:
                  return "TBD"
              return match.group(1).strip() or "TBD"

          def blocker_row(issue: dict) -> str:
              number = int(issue["number"])
              cherry_pick = parse_fix_field(issue, "Cherry-picked to release branch")
              if cherry_pick == "TBD" and "cherry-picked" in labels(issue):
                  cherry_pick = "yes"
              return (
                  f"| #{number} | {issue_severity(issue)} | {issue_owner(issue)} | "
                  f"{issue_status(issue)} | {parse_fix_field(issue, 'Fix commit on `main`')} | {cherry_pick} |"
              )

          def refresh_parent_table(issue: dict) -> None:
              parent = fetch_parent_issue(int(issue["number"]))
              if not parent or not (parent.get("title") or "").startswith("Release tracking:"):
                  return

              original_body = parent.get("body") or ""
              lines = original_body.splitlines()
              blockers_index = next(
                  (index for index, line in enumerate(lines) if line.strip().lower() == "## blockers"),
                  None,
              )
              if blockers_index is None:
                  return

              header_index = None
              for index in range(blockers_index + 1, len(lines)):
                  stripped = lines[index].strip()
                  if stripped.startswith("## "):
                      break
                  if stripped.startswith("| Issue |"):
                      header_index = index
                      break
              if header_index is None or header_index + 1 >= len(lines):
                  return

              table_start = header_index + 2
              table_end = table_start
              while table_end < len(lines) and lines[table_end].strip().startswith("|"):
                  table_end += 1

              issue_number = int(issue["number"])
              replaced = False
              next_rows: list[str] = []
              for row in lines[table_start:table_end]:
                  match = re.search(r"#(\d+)", row)
                  if match and int(match.group(1)) == issue_number:
                      next_rows.append(blocker_row(issue))
                      replaced = True
                  else:
                      next_rows.append(row)
              if not replaced:
                  next_rows.append(blocker_row(issue))

              lines[table_start:table_end] = next_rows
              next_body = "\n".join(lines).rstrip() + "\n"
              if next_body != original_body:
                  gh_api(
                      f"repos/{repo}/issues/{parent['number']}",
                      "--method",
                      "PATCH",
                      "--input",
                      "-",
                      input_json={"body": next_body},
                  )

          def comment(issue_number: int, body: str) -> None:
              gh_api(
                  f"repos/{repo}/issues/{issue_number}/comments",
                  "--method",
                  "POST",
                  "--input",
                  "-",
                  input_json={"body": body},
              )

          if pr_base != "main" and not pr_base.startswith("release/"):
              print(f"PR #{pr_number}: base {pr_base!r} is not main or release/*")
              sys.exit(0)

          issue_numbers = collect_issue_numbers()
          if not issue_numbers:
              print(f"PR #{pr_number}: no linked issue references found")
              sys.exit(0)

          for issue_number in issue_numbers:
              issue = fetch_issue(issue_number)
              if "pull_request" in issue or not is_release_bug(issue):
                  print(f"#{issue_number}: skipping non-release bug")
                  continue

              if pr_base == "main":
                  remove_label(issue_number, "needs-fix")
                  remove_label(issue_number, "cherry-picked")
                  add_labels(issue_number, ["fixed-on-main", "needs-cherrypick"])
                  if issue.get("state") == "closed":
                      set_issue_state(issue_number, "open")
                  patch_body(issue, {
                      "Fix PR": f"#{pr_number}",
                      "Fix commit on `main`": merge_sha[:12] if merge_sha else "merged",
                  })
                  comment(
                      issue_number,
                      f"Fix merged to `main` in #{pr_number} ({pr_url}). Cherry-pick to the release branch is now required.",
                  )
              else:
                  remove_label(issue_number, "needs-fix")
                  remove_label(issue_number, "fixed-on-main")
                  remove_label(issue_number, "needs-cherrypick")
                  add_labels(issue_number, ["cherry-picked"])
                  patch_body(issue, {
                      "Cherry-picked to release branch": f"{pr_base} via #{pr_number}",
                  })
                  comment(
                      issue_number,
                      f"Cherry-pick merged to `{pr_base}` in #{pr_number} ({pr_url}).",
                  )

              refreshed = fetch_issue(issue_number)
              refresh_parent_table(refreshed)
          PY
