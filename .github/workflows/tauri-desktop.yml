name: Tauri Desktop

on:
  workflow_dispatch:
  push:
    branches: [main, feat/react-frontend-refactor]
    tags: ["v*"]
    paths:
      - ".github/workflows/tauri-desktop.yml"
      - "frontend/**"
      - "frontend_bridge.py"
      - "frontend_bridge_core/**"
      - "requirements.txt"
      - "assets/**"
      - "asr/**"
      - "config/**"
      - "core/**"
      - "i18n/**"
      - "live/**"
      - "llm/**"
      - "sdk/**"
      - "t2i/**"
      - "tools/**"
      - "tts/**"
      - "ui/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/tauri-desktop.yml"
      - "frontend/**"
      - "frontend_bridge.py"
      - "frontend_bridge_core/**"
      - "requirements.txt"
      - "assets/**"
      - "asr/**"
      - "config/**"
      - "core/**"
      - "i18n/**"
      - "live/**"
      - "llm/**"
      - "sdk/**"
      - "t2i/**"
      - "tools/**"
      - "tts/**"
      - "ui/**"

permissions:
  contents: write

concurrency:
  group: tauri-desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Keep the desktop matrix limited to platforms that currently have
        # available CI runners. Add macOS x64 or Windows/Linux arm64 entries
        # only when matching runners are available.
        include:
          - platform: linux-x64
            os: ubuntu-latest
            bundles: deb
            runtime_asset: x86_64-unknown-linux-gnu
            runtime_python: runtime/bin/python3
            runtime_manifest_platform: linux
            runtime_manifest_arch: x64
            runtime_archive: tar-gz
          - platform: windows-x64
            os: windows-latest
            bundles: msi
            runtime_python: runtime/python.exe
            runtime_manifest_platform: windows
            runtime_manifest_arch: x64
            runtime_archive: zip
          - platform: macos-arm64
            os: macos-14
            bundles: dmg
            runtime_asset: aarch64-apple-darwin
            runtime_python: runtime/bin/python3
            runtime_manifest_platform: macos
            runtime_manifest_arch: arm64
            runtime_archive: tar-gz

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev patchelf portaudio19-dev

      - name: Install macOS Python build dependencies
        if: runner.os == 'macOS'
        run: brew install portaudio

      - name: Install Windows MSI dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Prepare Python runtime (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -fL -o python-embed.zip https://www.python.org/ftp/python/3.10.8/python-3.10.8-embed-amd64.zip
          rm -rf runtime
          mkdir -p runtime
          unzip -q python-embed.zip -d runtime
          curl -fL -o runtime/get-pip.py https://bootstrap.pypa.io/get-pip.py
          ./runtime/python.exe runtime/get-pip.py --no-warn-script-location
          sed -i 's/^#import site/import site/' runtime/python310._pth
          ./runtime/python.exe -m pip install --upgrade pip --no-warn-script-location
          ./runtime/python.exe -m pip install --prefer-binary -r requirements.txt --no-warn-script-location

      - name: Download Python runtime (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUNTIME_ASSET: ${{ matrix.runtime_asset }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          tag = "20221002"
          asset_key = os.environ["RUNTIME_ASSET"]
          api_url = f"https://api.github.com/repos/astral-sh/python-build-standalone/releases/tags/{tag}"
          request = urllib.request.Request(
              api_url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
              },
          )
          with urllib.request.urlopen(request, timeout=45) as response:
              release = json.load(response)
          for asset in release.get("assets", []):
              name = asset.get("name", "")
              if asset_key in name and name.endswith(".tar.gz"):
                  url = asset["browser_download_url"]
                  print(f"Downloading {name}")
                  urllib.request.urlretrieve(url, "python-standalone.tar.gz")
                  break
          else:
              raise SystemExit(f"No python-build-standalone asset matched {asset_key}")
          PY
          rm -rf runtime
          mkdir -p runtime
          tar -xzf python-standalone.tar.gz -C runtime --strip-components=1

      - name: Install Python dependencies (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./${{ matrix.runtime_python }} -m pip install --upgrade pip
          ./${{ matrix.runtime_python }} -m pip install --prefer-binary -r requirements.txt

      - name: Verify Python runtime
        shell: bash
        run: |
          ./${{ matrix.runtime_python }} frontend_bridge.py --check-runtime --project-root "$PWD" --requirements-file requirements.txt

      - name: Verify frontend
        working-directory: frontend
        run: |
          pnpm format:check
          pnpm lint:types
          pnpm test

      - name: Package Python runtime asset
        shell: bash
        env:
          RUNTIME_OFFICIAL_BASE_URL: ${{ startsWith(github.ref, 'refs/tags/v') && format('https://github.com/{0}/releases/download/{1}', github.repository, github.ref_name) || '' }}
          RUNTIME_CHINA_BASE_URL: ${{ vars.SHINSEKAI_RUNTIME_CHINA_BASE_URL }}
        run: |
          ./${{ matrix.runtime_python }} scripts/package_runtime.py \
            --runtime-dir runtime \
            --output-dir runtime-dist \
            --manifest frontend/src-tauri/runtime_manifest.json \
            --platform ${{ matrix.runtime_manifest_platform }} \
            --arch ${{ matrix.runtime_manifest_arch }} \
            --archive-type ${{ matrix.runtime_archive }} \
            --official-base-url "$RUNTIME_OFFICIAL_BASE_URL" \
            --china-base-url "$RUNTIME_CHINA_BASE_URL"

      - name: Build Tauri bundle
        working-directory: frontend
        shell: bash
        run: pnpm tauri build --ci --bundles ${{ matrix.bundles }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: shinsekai-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            runtime-dist/*
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage
            frontend/src-tauri/target/release/bundle/deb/*.deb
            frontend/src-tauri/target/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe

      - name: Attach bundles to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            runtime-dist/*
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage
            frontend/src-tauri/target/release/bundle/deb/*.deb
            frontend/src-tauri/target/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
