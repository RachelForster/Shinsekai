name: Tauri Desktop

on:
  workflow_dispatch:
  push:
    branches: [main, feat/react-frontend-refactor]
    paths:
      - ".github/workflows/tauri-desktop.yml"
      - "frontend/**"
      - "frontend_bridge.py"
      - "frontend_bridge_core/**"
      - "requirements.txt"
      - "assets/**"
      - "asr/**"
      - "config/**"
      - "core/**"
      - "i18n/**"
      - "live/**"
      - "llm/**"
      - "sdk/**"
      - "t2i/**"
      - "tools/**"
      - "tts/**"
      - "ui/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/tauri-desktop.yml"
      - "frontend/**"
      - "frontend_bridge.py"
      - "frontend_bridge_core/**"
      - "requirements.txt"
      - "assets/**"
      - "asr/**"
      - "config/**"
      - "core/**"
      - "i18n/**"
      - "live/**"
      - "llm/**"
      - "sdk/**"
      - "t2i/**"
      - "tools/**"
      - "tts/**"
      - "ui/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: tauri-desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            bundles: deb,rpm,appimage
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            bundles: deb,rpm,appimage
          - platform: windows-x64
            os: windows-latest
            bundles: msi,nsis
          - platform: windows-arm64
            os: windows-11-arm
            bundles: msi,nsis
          - platform: macos-arm64
            os: macos-14
            bundles: dmg

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev patchelf portaudio19-dev rpm
          if apt-cache show libfuse2t64 >/dev/null 2>&1; then
            sudo apt-get install -y -qq libfuse2t64
          else
            sudo apt-get install -y -qq libfuse2
          fi

      - name: Install Windows installer dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install wixtoolset nsis --no-progress -y

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        working-directory: frontend
        shell: bash
        run: pnpm tauri build --ci --bundles ${{ matrix.bundles }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: shinsekai-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage
            frontend/src-tauri/target/release/bundle/deb/*.deb
            frontend/src-tauri/target/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
            frontend/src-tauri/target/release/bundle/rpm/*.rpm
