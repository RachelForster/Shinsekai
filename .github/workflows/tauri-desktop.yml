name: Tauri Desktop

on:
  workflow_dispatch:
  push:
    branches: [main, feat/react-frontend-refactor]
    paths:
      - ".github/workflows/tauri-desktop.yml"
      - "frontend/**"
      - "frontend_bridge.py"
      - "frontend_bridge_core/**"
      - "requirements.txt"
      - "requirements-runtime-*.txt"
      - "requirements-dev.txt"
      - "test/unit/test_frontend_runtime_check.py"
      - "assets/**"
      - "asr/**"
      - "config/**"
      - "core/**"
      - "i18n/**"
      - "live/**"
      - "llm/**"
      - "sdk/**"
      - "t2i/**"
      - "tools/**"
      - "tts/**"
      - "ui/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/tauri-desktop.yml"
      - "frontend/**"
      - "frontend_bridge.py"
      - "frontend_bridge_core/**"
      - "requirements.txt"
      - "requirements-runtime-*.txt"
      - "requirements-dev.txt"
      - "test/unit/test_frontend_runtime_check.py"
      - "assets/**"
      - "asr/**"
      - "config/**"
      - "core/**"
      - "i18n/**"
      - "live/**"
      - "llm/**"
      - "sdk/**"
      - "t2i/**"
      - "tools/**"
      - "tts/**"
      - "ui/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: tauri-desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-gate:
    name: Runtime gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: dtolnay/rust-toolchain@1.96.0

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev patchelf \
            libegl1 libgl1 libglib2.0-0 \
            libportaudio2 portaudio19-dev

      - name: Install Python runtime dependencies
        run: |
          python -m pip install --upgrade pip -q
          pip install -r requirements-runtime-core.txt -q
          pip install pytest -q

      - name: Check desktop-core runtime
        run: |
          python frontend_bridge.py \
            --check-runtime \
            --json \
            --profile desktop-core \
            --project-root . \
            --requirements-file requirements-runtime-core.txt

      - name: Runtime manifest tests
        run: python -m pytest test/unit/test_frontend_runtime_check.py

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend for Tauri context
        working-directory: frontend
        run: pnpm build

      - name: Rust runtime tests
        run: cargo test --manifest-path frontend/src-tauri/Cargo.toml runtime

      - name: Verify embedded Python runtime matrix
        working-directory: frontend
        run: pnpm verify:runtime-matrix

      - name: Desktop runtime UI contract tests
        working-directory: frontend
        run: pnpm exec vitest run src/test/desktopApi.test.ts src/test/desktopChrome.test.tsx src/test/features/system-settings/SystemSettingsPage.test.tsx

  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            bundles: deb
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            bundles: deb
          - platform: windows-x64
            os: windows-latest
            bundles: none
          - platform: macos-arm64
            os: macos-14
            bundles: dmg

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@1.96.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev patchelf portaudio19-dev
          if apt-cache show libfuse2t64 >/dev/null 2>&1; then
            sudo apt-get install -y -qq libfuse2t64
          else
            sudo apt-get install -y -qq libfuse2
          fi

      - name: Install Windows installer dependencies
        if: runner.os == 'Windows' && matrix.bundles != 'none'
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Restore embedded Python runtime cache
        id: embedded-python-runtime-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .cache/python-build-standalone
            runtime
            wheels
          key: embedded-python-runtime-${{ runner.os }}-${{ matrix.platform }}-${{ hashFiles('frontend/src-tauri/runtime_sources.json', 'frontend/scripts/prepare-runtime.mjs', 'requirements-runtime-core.txt') }}

      - name: Prepare embedded Python runtime
        working-directory: frontend
        shell: bash
        env:
          SHINSEKAI_PBS_DOWNLOAD_BASES: ${{ vars.SHINSEKAI_PBS_DOWNLOAD_BASES }}
          SHINSEKAI_PIP_INDEX_URLS: ${{ vars.SHINSEKAI_PIP_INDEX_URLS }}
        run: pnpm prepare:runtime --target ${{ matrix.platform }} --verify

      - name: Save embedded Python runtime cache
        if: steps.embedded-python-runtime-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .cache/python-build-standalone
            runtime
            wheels
          key: embedded-python-runtime-${{ runner.os }}-${{ matrix.platform }}-${{ hashFiles('frontend/src-tauri/runtime_sources.json', 'frontend/scripts/prepare-runtime.mjs', 'requirements-runtime-core.txt') }}

      - name: Clear stale Tauri bundle outputs
        working-directory: frontend
        shell: bash
        run: |
          rm -rf src-tauri/target/release/bundle
          rm -rf src-tauri/target/release/runtime src-tauri/target/release/wheels
          rm -f src-tauri/target/release/requirements-runtime-*.txt

      - name: Build Tauri bundle
        working-directory: frontend
        shell: bash
        env:
          NO_STRIP: "1"
        run: |
          if [[ "${{ matrix.bundles }}" == "none" ]]; then
            pnpm tauri build --ci --no-bundle --config '{"bundle":{"createUpdaterArtifacts":false}}'
          else
            pnpm tauri build --ci --bundles ${{ matrix.bundles }} --config '{"bundle":{"createUpdaterArtifacts":false}}'
          fi

      - name: Dump Linux AppImage diagnostics
        if: failure() && runner.os == 'Linux'
        working-directory: frontend
        shell: bash
        run: |
          find src-tauri/target/release/bundle/appimage -maxdepth 4 -print || true
          find src-tauri/target/release/bundle/appimage \
            \( -name '*_tkinter*' -o -name 'libtcl*.so' -o -name 'libtk*.so' \) \
            -print || true

      - name: Verify packaged embedded Python runtime
        working-directory: frontend
        shell: bash
        run: |
          if [[ "${{ matrix.bundles }}" == "none" ]]; then
            pnpm verify:packaged-runtime --target ${{ matrix.platform }}
          else
            pnpm verify:packaged-runtime --target ${{ matrix.platform }} --require-installers --installer-bundles ${{ matrix.bundles }}
          fi

      - name: Upload workflow artifact
        if: matrix.bundles != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: shinsekai-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage
            frontend/src-tauri/target/release/bundle/deb/*.deb
            frontend/src-tauri/target/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
            frontend/src-tauri/target/release/bundle/rpm/*.rpm
