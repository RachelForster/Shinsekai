name: Release

on:
  schedule:
    - cron: "0 9 1,15 * *"
  workflow_dispatch:

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      TAG: ${{ steps.gen.outputs.TAG }}
    steps:
      - name: Generate tag
        id: gen
        run: |
          TAG="v$(date +%Y.%m.%d)"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

  test:
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libegl1 libxkbcommon0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libglib2.0-0 libportaudio2 portaudio19-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip -q
          pip install -r requirements.txt -q
          pip install pytest pytest-qt pytest-mock pytest-env -q

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONIOENCODING: utf-8
        run: python -m pytest -v --tb=short --strict-markers -p no:warnings

  release:
    needs: [tag, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.TAG }}
          name: ${{ needs.tag.outputs.TAG }}
          generate_release_notes: true
          prerelease: true

  bundle:
    needs: [tag, test]
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            artifact: Shinsekai-${{ needs.tag.outputs.TAG }}-windows-x64.zip
            embed_url: https://www.python.org/ftp/python/3.10.8/python-3.10.8-embed-amd64.zip
            embed_archive: python-embed.zip
            pth_file: python310._pth
          - os: macos-latest
            platform: macos-arm64
            artifact: Shinsekai-${{ needs.tag.outputs.TAG }}-macos-arm64.zip
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10 (Windows download embeddable)
        if: matrix.platform == 'windows-x64'
        shell: bash
        run: |
          curl -fL -o python-embed.zip "https://www.python.org/ftp/python/3.10.8/python-3.10.8-embed-amd64.zip"

      - name: Setup Python 3.10 (macOS via python-build-standalone)
        if: matrix.platform != 'windows-x64'
        shell: bash
        run: |
          ASSET_URL=$(curl -sS --connect-timeout 15 --max-time 30 \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/indygreg/python-build-standalone/releases" \
            | python3 -c "
          import sys, json
          releases = json.load(sys.stdin)
          if not isinstance(releases, list):
              # rate-limited or error
              err = releases.get('message', 'unknown error')
              raise SystemExit(f'GitHub API error: {err}')
          for rel in releases:
              tag = rel.get('tag_name', '')
              if tag == '20221002':
                  for a in rel.get('assets', []):
                      n = a.get('name', '')
                      if 'aarch64-apple-darwin' in n and n.endswith('.tar.gz'):
                          print(a['browser_download_url'])
                          raise SystemExit(0)
          raise SystemExit('no matching asset found')
          ")
          echo "Downloading: $ASSET_URL"
          curl -fL --connect-timeout 15 --max-time 600 -o python-standalone.tar.gz "$ASSET_URL"

      - name: Extract Python to runtime/
        shell: bash
        run: |
          rm -rf runtime
          if [[ "${{ matrix.platform }}" == "windows-x64" ]]; then
            mkdir -p runtime
            unzip -q python-embed.zip -d runtime/
          else
            mkdir -p runtime
            tar -xzf python-standalone.tar.gz -C runtime/ --strip-components=1
          fi

      - name: Setup pip and modify _pth (Windows)
        if: matrix.platform == 'windows-x64'
        shell: bash
        run: |
          curl -fL -o runtime/get-pip.py https://bootstrap.pypa.io/get-pip.py
          ./runtime/python.exe runtime/get-pip.py --no-warn-script-location
          sed -i 's/^#import site/import site/' runtime/python310._pth

      - name: Setup pip (macOS)
        if: matrix.platform != 'windows-x64'
        shell: bash
        run: |
          ./runtime/bin/python3 -m pip install --upgrade pip -q

      - name: Make scripts executable (macOS)
        if: matrix.platform != 'windows-x64'
        shell: bash
        run: chmod +x scripts/install.sh scripts/start.sh

      - name: Create bundle archive (Windows)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        run: |
          Compress-Archive -Path * -DestinationPath "${{ matrix.artifact }}" -Force

      - name: Create bundle archive (macOS)
        if: matrix.platform != 'windows-x64'
        shell: bash
        run: |
          zip -rq "${{ matrix.artifact }}" . \
            -x '.git/*' '*.pyc' '__pycache__/*' \
            'data/tts_bundles/*' '*.egg-info/*' '*.dist-info/*'

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.TAG }}
          files: ${{ matrix.artifact }}
