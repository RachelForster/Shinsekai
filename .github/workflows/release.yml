name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create, for example v2.1.0-rc.1 or v2.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: true
        type: boolean
  push:
    tags: ["v*"]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.gen.outputs.tag }}
      prerelease: ${{ steps.gen.outputs.prerelease }}
      make_latest: ${{ steps.gen.outputs.make_latest }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: gen
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if [[ -n "${INPUT_TAG}" ]]; then
            TAG="${INPUT_TAG}"
            PRERELEASE="${INPUT_PRERELEASE}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
            if [[ "${TAG}" == *"-rc."* ]]; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
          else
            echo "release_tag is required for manual release runs." >&2
            exit 1
          fi
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "Invalid release tag: ${TAG}" >&2
            echo "Expected vX.Y.Z or vX.Y.Z-rc.N." >&2
            exit 1
          fi
          if [[ "${PRERELEASE}" != "true" && "${PRERELEASE}" != "false" ]]; then
            echo "Invalid prerelease value: ${PRERELEASE}" >&2
            exit 1
          fi
          if [[ "${PRERELEASE}" == "true" ]]; then
            MAKE_LATEST="false"
          else
            MAKE_LATEST="true"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "make_latest=${MAKE_LATEST}" >> "$GITHUB_OUTPUT"

  tracking-issue:
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - name: Create or update release tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.tag.outputs.tag }}
          IS_PRERELEASE: ${{ needs.tag.outputs.prerelease }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys
          import textwrap
          from urllib.parse import quote

          repo = os.environ["REPO"]
          tag = os.environ["RELEASE_TAG"]
          is_prerelease = os.environ["IS_PRERELEASE"].lower() == "true"
          ref_name = os.environ["REF_NAME"]
          sha = os.environ["SHA"]
          run_url = os.environ["RUN_URL"]
          actor = os.environ["ACTOR"]

          base_tag = re.sub(r"-rc\.\d+$", "", tag)
          version = base_tag.removeprefix("v")
          match = re.match(r"^(\d+)\.(\d+)\.\d+$", version)
          if not match:
              raise SystemExit(f"Cannot derive release branch from tag: {tag}")

          release_branch = ref_name if ref_name.startswith("release/") else f"release/{match.group(1)}.{match.group(2)}"
          title = f"Release tracking: {base_tag}"
          release_kind = "RC" if is_prerelease else "formal release"

          def gh_api(*args: str, input_json: dict | None = None, check: bool = True) -> str:
              command = ["gh", "api", *args]
              payload = None if input_json is None else json.dumps(input_json)
              result = subprocess.run(
                  command,
                  input=payload,
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
              )
              if check and result.returncode != 0:
                  print(f"gh api failed: {' '.join(command[2:])}", file=sys.stderr)
                  print(result.stderr, file=sys.stderr)
                  raise SystemExit(result.returncode)
              return result.stdout

          def ensure_label(name: str, color: str, description: str) -> None:
              label_path = f"repos/{repo}/labels/{quote(name, safe='')}"
              existing = subprocess.run(
                  ["gh", "api", label_path],
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
              )
              if existing.returncode == 0:
                  return
              gh_api(
                  f"repos/{repo}/labels",
                  "--method",
                  "POST",
                  "--input",
                  "-",
                  input_json={"name": name, "color": color, "description": description},
              )

          def search_issue() -> dict | None:
              query = f'repo:{repo} is:issue in:title "{title}"'
              output = gh_api(f"search/issues?q={quote(query, safe='')}&per_page=10")
              items = json.loads(output).get("items", [])
              for item in items:
                  if item.get("title") == title:
                      return item
              return None

          def ensure_milestone(milestone_title: str) -> int:
              page = 1
              while True:
                  output = gh_api(
                      f"repos/{repo}/milestones?state=all&per_page=100&page={page}"
                  )
                  milestones = json.loads(output)
                  if not milestones:
                      break
                  for milestone in milestones:
                      if milestone.get("title") == milestone_title:
                          number = int(milestone["number"])
                          if milestone.get("state") == "closed":
                              gh_api(
                                  f"repos/{repo}/milestones/{number}",
                                  "--method",
                                  "PATCH",
                                  "--input",
                                  "-",
                                  input_json={"state": "open"},
                              )
                          return number
                  page += 1

              created = json.loads(
                  gh_api(
                      f"repos/{repo}/milestones",
                      "--method",
                      "POST",
                      "--input",
                      "-",
                      input_json={
                          "title": milestone_title,
                          "description": f"Release milestone for {milestone_title}",
                      },
                  )
              )
              return int(created["number"])

          body = textwrap.dedent(f"""\
          ## Release

          - Version: {version}
          - Release branch: `{release_branch}`
          - Current RC tag: `{tag if is_prerelease else "n/a"}`
          - Owner: @{actor}

          ## Release setup

          - [ ] Root `VERSION` updated if needed
          - [ ] `pnpm sync:version` run from `frontend`

          ## Manual smoke tests

          - [ ] Windows x64 install/start/restart
          - [ ] Core chat
          - [ ] Plugin/tool call
          - [ ] Character/template/config read-write
          - [ ] Runtime diagnostics
          - [ ] Updater manifest/signature

          ## Blockers

          | Issue | Severity | Owner | Status | Fix commit | Cherry-picked |
          | --- | --- | --- | --- | --- | --- |

          Comment with an issue reference, such as `#123`, to automatically add it as a sub-issue and sync it into this table.

          ## Release runs

          | Tag | Type | Commit | Workflow |
          | --- | --- | --- | --- |
          | `{tag}` | {release_kind} | `{sha[:12]}` | [run]({run_url}) |

          ## Release decision

          - [ ] Ship
          - [ ] Re-spin RC
          - [ ] Abort release

          ## Labels

          labels:
            - maintenance
            - p1
          """)

          comment = textwrap.dedent(f"""\
          Release workflow started for `{tag}`.

          - Type: {release_kind}
          - Branch/ref: `{ref_name}`
          - Commit: `{sha}`
          - Workflow: {run_url}
          """)

          ensure_label("maintenance", "5319e7", "Project maintenance work")
          ensure_label("p1", "d93f0b", "Priority 1")
          milestone_number = ensure_milestone(base_tag)

          issue = search_issue()
          if issue is None:
              created = json.loads(
                  gh_api(
                      f"repos/{repo}/issues",
                      "--method",
                      "POST",
                      "--input",
                      "-",
                      input_json={
                          "title": title,
                          "body": body,
                          "labels": ["maintenance", "p1"],
                          "milestone": milestone_number,
                      },
                  )
              )
              print(f"Created release tracking issue: {created['html_url']}")
          else:
              number = issue["number"]
              gh_api(
                  f"repos/{repo}/issues/{number}",
                  "--method",
                  "PATCH",
                  "--input",
                  "-",
                  input_json={"milestone": milestone_number},
              )
              gh_api(
                  f"repos/{repo}/issues/{number}/comments",
                  "--method",
                  "POST",
                  "--input",
                  "-",
                  input_json={"body": comment},
              )
              if issue.get("state") == "closed":
                  gh_api(
                      f"repos/{repo}/issues/{number}",
                      "--method",
                      "PATCH",
                      "--input",
                      "-",
                      input_json={"state": "open"},
                  )
              print(f"Updated release tracking issue: {issue['html_url']}")
          PY

  release:
    needs: [tag, tracking-issue]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: ${{ needs.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ needs.tag.outputs.prerelease == 'true' }}
          make_latest: ${{ needs.tag.outputs.make_latest }}

  package:
    needs: [tag, release]
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            bundles: deb,appimage
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            bundles: deb,appimage
          - platform: windows-x64
            os: windows-latest
            bundles: nsis
          - platform: windows-arm64
            os: windows-11-arm
            bundles: nsis
          - platform: macos-arm64
            os: macos-14
            bundles: dmg,app

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@1.96.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev patchelf
          if apt-cache show libfuse2t64 >/dev/null 2>&1; then
            sudo apt-get install -y -qq libfuse2t64
          else
            sudo apt-get install -y -qq libfuse2
          fi

      - name: Install Windows installer dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Verify release version consistency
        shell: bash
        run: |
          repo_version="$(head -1 VERSION | sed 's/-dev//' | sed 's/^v//')"
          tauri_version="$(node -p "require('./frontend/package.json').version")"
          if [[ "${repo_version}" != "${tauri_version}" ]]; then
            echo "VERSION (${repo_version}) must match frontend/package.json (${tauri_version}) for Tauri updater releases." >&2
            exit 1
          fi

      - name: Verify updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is required for release builds with updater artifacts." >&2
            exit 1
          fi

      - name: Restore embedded Python runtime cache
        id: embedded-python-runtime-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .cache/python-build-standalone
            runtime
          key: embedded-python-runtime-${{ runner.os }}-${{ matrix.platform }}-${{ hashFiles('frontend/src-tauri/runtime_sources.json', 'frontend/scripts/prepare-runtime.mjs') }}

      - name: Prepare embedded Python runtime
        working-directory: frontend
        shell: bash
        env:
          SHINSEKAI_PBS_DOWNLOAD_BASES: ${{ vars.SHINSEKAI_PBS_DOWNLOAD_BASES }}
          SHINSEKAI_PIP_INDEX_URLS: ${{ vars.SHINSEKAI_PIP_INDEX_URLS }}
        run: pnpm prepare:runtime --target ${{ matrix.platform }} --verify --skip-wheels

      - name: Save embedded Python runtime cache
        if: steps.embedded-python-runtime-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .cache/python-build-standalone
            runtime
          key: embedded-python-runtime-${{ runner.os }}-${{ matrix.platform }}-${{ hashFiles('frontend/src-tauri/runtime_sources.json', 'frontend/scripts/prepare-runtime.mjs') }}

      - name: Clear stale Tauri bundle outputs
        working-directory: frontend
        shell: bash
        run: |
          rm -rf src-tauri/target/release/bundle
          rm -rf src-tauri/target/release/runtime src-tauri/target/release/wheels
          rm -f src-tauri/target/release/requirements-runtime-*.txt

      - name: Build Tauri bundle
        working-directory: frontend
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --ci --bundles ${{ matrix.bundles }}

      - name: Collect release assets
        shell: bash
        run: |
          rm -rf release-assets
          mkdir -p release-assets
          mkdir -p latest-fragments
          version="$(node -p "require('./frontend/package.json').version")"
          base="Shinsekai-${version}_${{ matrix.platform }}"
          release_url_base="https://github.com/${{ github.repository }}/releases/download/${{ needs.tag.outputs.tag }}"
          case "${{ matrix.platform }}" in
            linux-x64) updater_os="linux"; updater_arch="x86_64" ;;
            linux-arm64) updater_os="linux"; updater_arch="aarch64" ;;
            windows-x64) updater_os="windows"; updater_arch="x86_64" ;;
            windows-arm64) updater_os="windows"; updater_arch="aarch64" ;;
            macos-arm64) updater_os="darwin"; updater_arch="aarch64" ;;
            *) updater_os=""; updater_arch="" ;;
          esac
          write_latest_fragment() {
            local target_key="$1"
            local asset_name="$2"
            local signature_file="release-assets/${asset_name}.sig"
            if [[ -z "${target_key}" || ! -f "${signature_file}" ]]; then
              return
            fi
            local url="${release_url_base}/${asset_name}"
            local output="latest-fragments/${target_key}.json"
            node -e '
              const fs = require("fs");
              const [target, url, signaturePath, output] = process.argv.slice(1);
              const signature = fs.readFileSync(signaturePath, "utf8").trim();
              fs.writeFileSync(output, JSON.stringify({ [target]: { url, signature } }, null, 2));
            ' "${target_key}" "${url}" "${signature_file}" "${output}"
            echo "latest fragment ${target_key} -> ${url}"
          }
          collect_asset() {
            local asset="$1"
            local target="$2"
            local updater_suffix="$3"
            local generic_fallback="$4"
            cp "$asset" "release-assets/$target"
            echo "$asset -> release-assets/$target"
            if [[ -f "${asset}.sig" ]]; then
              cp "${asset}.sig" "release-assets/${target}.sig"
              echo "${asset}.sig -> release-assets/${target}.sig"
              if [[ -n "${updater_os}" && -n "${updater_arch}" && -n "${updater_suffix}" ]]; then
                write_latest_fragment "${updater_os}-${updater_arch}-${updater_suffix}" "${target}"
              fi
              if [[ "${generic_fallback}" == "true" && -n "${updater_os}" && -n "${updater_arch}" ]]; then
                write_latest_fragment "${updater_os}-${updater_arch}" "${target}"
              fi
            fi
            count=$((count + 1))
          }
          collect_required() {
            local pattern="$1"
            local target="$2"
            local updater_suffix="$3"
            local generic_fallback="$4"
            local matches=($pattern)
            if [[ "${#matches[@]}" -eq 0 ]]; then
              echo "Required release asset is missing: ${pattern}" >&2
              exit 1
            fi
            if [[ "${#matches[@]}" -gt 1 ]]; then
              echo "Required release asset is ambiguous: ${pattern}" >&2
              printf '  %s\n' "${matches[@]}" >&2
              exit 1
            fi
            collect_asset "${matches[0]}" "${target}" "${updater_suffix}" "${generic_fallback}"
          }
          shopt -s nullglob
          count=0
          case "${{ matrix.platform }}" in
            linux-*)
              collect_required "frontend/src-tauri/target/release/bundle/appimage/*.AppImage" "${base}.AppImage" "appimage" true
              collect_required "frontend/src-tauri/target/release/bundle/deb/*.deb" "${base}.deb" "deb" false
              ;;
            windows-*)
              collect_required "frontend/src-tauri/target/release/bundle/nsis/*.exe" "${base}-setup.exe" "nsis" true
              ;;
            macos-*)
              collect_required "frontend/src-tauri/target/release/bundle/dmg/*.dmg" "${base}.dmg" "" false
              collect_required "frontend/src-tauri/target/release/bundle/macos/*.app.tar.gz" "${base}.app.tar.gz" "app" true
              ;;
            *)
              echo "Unsupported release platform: ${{ matrix.platform }}" >&2
              exit 1
              ;;
          esac
          if [[ "$count" -eq 0 ]]; then
            echo "No release assets were collected." >&2
            exit 1
          fi
          ls -lh release-assets

      - name: Delete stale Windows MSI release assets
        if: startsWith(matrix.platform, 'windows-')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./frontend/package.json').version")"
          base="Shinsekai-${version}_${{ matrix.platform }}"
          for asset in "${base}.msi" "${base}.msi.sig"; do
            existing="$(gh release view "${{ needs.tag.outputs.tag }}" --json assets --jq ".assets[].name | select(. == \"${asset}\")")"
            if [[ -n "${existing}" ]]; then
              gh release delete-asset "${{ needs.tag.outputs.tag }}" "${asset}" --yes
            fi
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          prerelease: ${{ needs.tag.outputs.prerelease == 'true' }}
          make_latest: ${{ needs.tag.outputs.make_latest }}
          files: release-assets/*

      - name: Upload latest manifest fragments
        uses: actions/upload-artifact@v4
        with:
          name: latest-fragment-${{ matrix.platform }}
          if-no-files-found: error
          path: latest-fragments/*.json

  latest:
    needs: [tag, release, package]
    if: ${{ needs.tag.outputs.prerelease != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download latest manifest fragments
        uses: actions/download-artifact@v4
        with:
          pattern: latest-fragment-*
          path: latest-fragments
          merge-multiple: true

      - name: Generate latest.json
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.tag.outputs.tag }}
        run: |
          version="$(node -p "require('./frontend/package.json').version")"
          export RELEASE_VERSION="$version"
          node -e '
            const fs = require("fs");
            const path = require("path");
            const dir = "latest-fragments";
            const platforms = {};
            for (const file of fs.readdirSync(dir).filter((name) => name.endsWith(".json")).sort()) {
              Object.assign(platforms, JSON.parse(fs.readFileSync(path.join(dir, file), "utf8")));
            }
            if (Object.keys(platforms).length === 0) {
              throw new Error("No updater platforms were generated.");
            }
            const manifest = {
              version: process.env.RELEASE_VERSION,
              notes: `Shinsekai ${process.env.RELEASE_TAG}`,
              pub_date: new Date().toISOString(),
              platforms,
            };
            fs.writeFileSync("latest.json", `${JSON.stringify(manifest, null, 2)}\n`);
          '

      - name: Upload latest.json
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          prerelease: false
          make_latest: true
          files: latest.json
