name: Release

on:
  schedule:
    - cron: "0 9 1,15 * *"
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.gen.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: gen
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            VER="$(head -1 VERSION | sed 's/-dev//' | sed 's/^v//')"
            TAG="v${VER}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  release:
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create or update release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: ${{ needs.tag.outputs.tag }}
          generate_release_notes: true
          prerelease: true

      - name: Create or update release (scheduled/manual)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: ${{ needs.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: true

  package:
    needs: [tag, release]
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            bundles: deb,appimage
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            bundles: deb,appimage
          - platform: windows-x64
            os: windows-latest
            bundles: msi,nsis
          - platform: windows-arm64
            os: windows-11-arm
            bundles: msi,nsis
          - platform: macos-arm64
            os: macos-14
            bundles: dmg

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev patchelf
          if apt-cache show libfuse2t64 >/dev/null 2>&1; then
            sudo apt-get install -y -qq libfuse2t64
          else
            sudo apt-get install -y -qq libfuse2
          fi

      - name: Install Windows installer dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install wixtoolset nsis --no-progress -y

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        working-directory: frontend
        shell: bash
        run: pnpm tauri build --ci --bundles ${{ matrix.bundles }}

      - name: Collect release assets
        shell: bash
        run: |
          rm -rf release-assets
          mkdir -p release-assets
          find frontend/src-tauri/target/release/bundle -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) \
            -exec cp {} release-assets/ \;
          ls -lh release-assets

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: release-assets/*
