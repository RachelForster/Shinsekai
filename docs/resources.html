<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resources — Shinsekai</title>
<style>
  :root {
    --sakura: #ffb7c5;
    --pink: #f0a0c0;
    --pink-deep: #d4788e;
    --text: #4a2a38;
    --muted: #9a6a7c;
    --card-bg: rgba(255, 255, 255, 0.7);
    --card-border: rgba(212, 120, 142, 0.2);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: linear-gradient(170deg, #fff0f5 0%, #ffe4ec 28%, #ffd6e4 52%, #ffe8f0 76%, #fff0f5 100%);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 10% 15%, rgba(255, 183, 197, 0.4) 0%, transparent 50%),
      radial-gradient(circle at 90% 55%, rgba(240, 160, 192, 0.35) 0%, transparent 55%);
  }

  .container { max-width: 960px; margin: 0 auto; padding: 40px 24px; position: relative; z-index: 1; }

  header { text-align: center; padding: 40px 0 36px; position: relative; }
  header h1 {
    font-size: 2.4em; letter-spacing: 3px; margin-bottom: 8px;
    background: linear-gradient(135deg, #e8789a, #d4788e, #c0607a);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 800;
  }
  header .top-links { margin-top: 6px; }
  header a { color: var(--muted); text-decoration: none; font-size: 0.95em; margin: 0 8px; }
  header a:hover { color: var(--pink-deep); }

  .lang-switch {
    position: absolute; top: 0; right: 0;
    display: flex; gap: 4px;
  }
  .lang-switch button {
    background: none; border: 1px solid var(--card-border);
    padding: 4px 12px; border-radius: 12px; cursor: pointer;
    color: var(--muted); font-size: 0.85em; transition: all 0.2s;
  }
  .lang-switch button.active {
    background: var(--pink); color: #fff; border-color: var(--pink);
  }

  .toolbar {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 14px; padding: 20px 24px; margin-bottom: 24px;
    backdrop-filter: blur(8px); display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .toolbar label { font-weight: 600; color: var(--pink-deep); white-space: nowrap; }
  .toolbar select, .toolbar input {
    padding: 8px 14px; border: 2px solid var(--card-border); border-radius: 20px;
    background: #fff; color: var(--text); font-size: 0.95em; outline: none;
    transition: border-color 0.2s;
  }
  .toolbar select:focus, .toolbar input:focus { border-color: var(--pink); }
  .toolbar input { flex: 1; min-width: 180px; }
  .toolbar .count { color: var(--muted); font-size: 0.9em; white-space: nowrap; }
  .toolbar-upload {
    color: #fff; background: var(--pink-deep); padding: 6px 16px; border-radius: 16px;
    text-decoration: none; font-size: 0.85em; font-weight: 600; white-space: nowrap;
    transition: background 0.2s;
  }
  .toolbar-upload:hover { background: #c0607a; }

  table {
    width: 100%; border-collapse: separate; border-spacing: 0;
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 14px; overflow: hidden; backdrop-filter: blur(8px);
  }
  thead th {
    background: rgba(240, 160, 192, 0.15); color: var(--pink-deep);
    padding: 14px 16px; text-align: left; font-size: 0.9em; font-weight: 700;
    border-bottom: 2px solid var(--pink);
  }
  tbody td {
    padding: 12px 16px; border-bottom: 1px solid rgba(212, 120, 142, 0.1);
    font-size: 0.93em;
  }
  tbody tr:hover { background: rgba(255, 183, 197, 0.12); }
  tbody tr:last-child td { border-bottom: none; }

  .btn-dl {
    display: inline-block; background: var(--pink); color: #fff;
    padding: 5px 16px; border-radius: 16px; text-decoration: none;
    font-size: 0.85em; font-weight: 600; transition: background 0.2s;
  }
  .btn-dl:hover { background: var(--pink-deep); }

  #loading { text-align: center; padding: 60px; color: var(--muted); }
  #error { text-align: center; padding: 60px; color: var(--pink-deep); display: none; }

  .pagination {
    display: flex; justify-content: center; align-items: center; gap: 8px;
    margin-top: 20px; flex-wrap: wrap;
  }
  .pagination button {
    background: #fff; border: 2px solid var(--card-border);
    padding: 6px 14px; border-radius: 16px; cursor: pointer;
    color: var(--pink-deep); font-size: 0.9em; font-weight: 600;
    transition: all 0.2s;
  }
  .pagination button:hover:not(:disabled) { border-color: var(--pink); background: #fff0f5; }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .pagination button.active { background: var(--pink); color: #fff; border-color: var(--pink); }
  .pagination .page-info { color: var(--muted); font-size: 0.9em; margin: 0 8px; }

  footer {
    text-align: center; color: var(--muted); font-size: 0.85em;
    margin-top: 48px; padding: 24px 0;
    border-top: 1px solid rgba(212, 120, 142, 0.15);
  }
  footer a { color: var(--pink-deep); text-decoration: none; }
</style>
</head>
<body>
<div class="container">

<header>
  <div class="lang-switch">
    <button id="lang-zh" onclick="setLang('zh')">中</button>
    <button id="lang-en" onclick="setLang('en')">EN</button>
  </div>
  <h1 data-i18n="title">资源下载</h1>
  <div class="top-links">
    <a href="./" data-i18n="back_home">← 返回首页</a>
  </div>
</header>

<div class="toolbar">
  <label for="type-filter" data-i18n="filter_label">类型：</label>
  <select id="type-filter">
    <option value="all" data-i18n="filter_all">全部</option>
    <option value="character" data-i18n="filter_char">角色包</option>
    <option value="background" data-i18n="filter_bg">背景包</option>
  </select>
  <input type="text" id="search" data-i18n-placeholder="search_ph" placeholder="搜索名称…">
  <a href="https://wj.qq.com/s2/26613318/4fd2/" target="_blank" class="toolbar-upload" data-i18n="upload_char">上传角色</a>
  <a href="https://wj.qq.com/s2/26616089/b61a/" target="_blank" class="toolbar-upload" data-i18n="upload_bg">上传背景</a>
  <span class="count" id="count"></span>
</div>

<div id="loading" data-i18n="loading">🌸 正在加载资源列表…</div>
<div id="error" data-i18n="error" style="display:none">加载失败，请稍后重试。</div>

<table id="table" style="display:none">
  <thead>
    <tr>
      <th data-i18n="col_name">名称</th>
      <th data-i18n="col_type">类型</th>
      <th data-i18n="col_uploader">上传者</th>
      <th data-i18n="col_time">更新时间</th>
      <th data-i18n="col_pass">密码</th>
      <th data-i18n="col_dl">下载</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="pagination" id="pagination"></div>

<footer>
  <p><span data-i18n="footer_text">资源由社区贡献</span> &nbsp;·&nbsp; <a href="https://github.com/RachelForster/Shinsekai-Resource-Update">GitHub</a></p>
</footer>

</div>

<script>
// ── i18n ────────────────────────────────────────────────────────
var L = {
  zh: {
    title: '资源下载',
    back_home: '← 返回首页',
    filter_label: '类型：',
    filter_all: '全部',
    filter_char: '角色包',
    filter_bg: '背景包',
    search_ph: '搜索名称…',
    loading: '🌸 正在加载资源列表…',
    error: '加载失败，请稍后重试。',
    col_name: '名称',
    col_type: '类型',
    col_uploader: '上传者',
    col_time: '更新时间',
    col_pass: '密码',
    col_dl: '下载',
    type_char: '角色包',
    type_bg: '背景包',
    count: '共 {n} 项',
    dl_btn: '下载',
    footer_text: '资源由社区贡献',
    no_uploader: '—',
    upload_char: '上传角色',
    upload_bg: '上传背景',
    page_prev: '上一页',
    page_next: '下一页',
    page_info: '第 {page} / {total} 页'
  },
  en: {
    title: 'Resources',
    back_home: '← Back to Home',
    filter_label: 'Type: ',
    filter_all: 'All',
    filter_char: 'Characters',
    filter_bg: 'Backgrounds',
    search_ph: 'Search by name…',
    loading: '🌸 Loading resources…',
    error: 'Failed to load. Please try again later.',
    col_name: 'Name',
    col_type: 'Type',
    col_uploader: 'Uploader',
    col_time: 'Updated',
    col_pass: 'Password',
    col_dl: 'Download',
    type_char: 'Character',
    type_bg: 'Background',
    count: '{n} items',
    dl_btn: 'Download',
    footer_text: 'Resources contributed by the community',
    no_uploader: '—',
    upload_char: 'Upload Char',
    upload_bg: 'Upload BG',
    page_prev: 'Previous',
    page_next: 'Next',
    page_info: 'Page {page} / {total}'
  }
};

var lang = 'zh';

function t(key, vars) {
  var s = (L[lang] && L[lang][key]) ? L[lang][key] : (L.en[key] || key);
  if (vars) {
    Object.keys(vars).forEach(function (k) { s = s.replace('{' + k + '}', vars[k]); });
  }
  return s;
}

function setLang(l) {
  lang = l;
  localStorage.setItem('shinsekai-resources-lang', l);
  document.getElementById('lang-zh').className = l === 'zh' ? 'active' : '';
  document.getElementById('lang-en').className = l === 'en' ? 'active' : '';
  document.documentElement.lang = l === 'en' ? 'en' : 'zh-CN';

  // Update all data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(function (el) {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  // Update data-i18n-placeholder elements
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function (el) {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });
  // Re-render table to update type labels and button text
  if (window._allItems) doFilter();
}

// Restore saved language or detect from browser
var saved = localStorage.getItem('shinsekai-resources-lang');
if (!saved) { saved = navigator.language.startsWith('zh') ? 'zh' : 'en'; }
setLang(saved);

// ── Data loading ────────────────────────────────────────────────
var allItems = [];
window._allItems = allItems;
var currentPage = 1;
var pageSize = 10;

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderPage(filtered) {
  var total = Math.ceil(filtered.length / pageSize) || 1;
  if (currentPage > total) currentPage = total;
  var start = (currentPage - 1) * pageSize;
  var pageItems = filtered.slice(start, start + pageSize);

  var tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  pageItems.forEach(function (item) {
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><strong>' + esc(item.name) + '</strong></td>' +
      '<td>' + esc(item._type === 'background' ? t('type_bg') : t('type_char')) + '</td>' +
      '<td>' + (item.uploader ? esc(item.uploader) : '<span style="color:var(--muted)">' + t('no_uploader') + '</span>') + '</td>' +
      '<td>' + esc(item.time || '') + '</td>' +
      '<td>' + (item.password ? '<code>' + esc(item.password) + '</code>' : '<span style="color:var(--muted)">—</span>') + '</td>' +
      '<td><a class="btn-dl" href="' + esc(item.url) + '" target="_blank">' + t('dl_btn') + '</a></td>';
    tbody.appendChild(tr);
  });
  document.getElementById('count').textContent = t('count', {n: filtered.length});
  document.getElementById('table').style.display = '';
  renderPagination(total);
}

function renderPagination(total) {
  var pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  var html = '';
  html += '<button ' + (currentPage === 1 ? 'disabled' : '') + ' onclick="goPage(' + (currentPage - 1) + ')">' + t('page_prev') + '</button>';
  for (var i = 1; i <= total; i++) {
    html += '<button class="' + (i === currentPage ? 'active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
  }
  html += '<button ' + (currentPage === total ? 'disabled' : '') + ' onclick="goPage(' + (currentPage + 1) + ')">' + t('page_next') + '</button>';
  html += '<span class="page-info">' + t('page_info', {page: currentPage, total: total}) + '</span>';
  pg.innerHTML = html;
}

function goPage(n) { currentPage = n; doFilter(); }

function doFilter() {
  var kw = document.getElementById('search').value.trim().toLowerCase();
  var type = document.getElementById('type-filter').value;
  var filtered = allItems.filter(function (item) {
    if (type === 'character' && item._type !== 'character') return false;
    if (type === 'background' && item._type !== 'background') return false;
    if (kw && item.name.toLowerCase().indexOf(kw) === -1) return false;
    return true;
  });
  renderPage(filtered);
}

document.getElementById('search').addEventListener('input', function () { currentPage = 1; doFilter(); });
document.getElementById('type-filter').addEventListener('change', function () { currentPage = 1; doFilter(); });

var params = new URLSearchParams(window.location.search);
var urlType = params.get('type');
if (urlType === 'character' || urlType === 'background') {
  document.getElementById('type-filter').value = urlType;
}

(async function () {
  var loading = document.getElementById('loading');
  var error = document.getElementById('error');
  try {
    var charsResp = await fetch('https://raw.githubusercontent.com/RachelForster/Shinsekai-Resource-Update/main/characters.json');
    var bgsResp = await fetch('https://raw.githubusercontent.com/RachelForster/Shinsekai-Resource-Update/main/backgrounds.json');
    var chars = charsResp.ok ? await charsResp.json() : [];
    var bgs = bgsResp.ok ? await bgsResp.json() : [];
    chars.forEach(function (c) { c._type = 'character'; });
    bgs.forEach(function (b) { b._type = 'background'; });
    allItems = chars.concat(bgs);
    allItems.sort(function (a, b) { return (b.time || '').localeCompare(a.time || ''); });
    loading.style.display = 'none';
    doFilter();
  } catch (e) {
    loading.style.display = 'none';
    error.style.display = '';
  }
})();
</script>
</body>
</html>
