nodes:
  - name: llm_worker
    type: core.runtime.workers.LLMWorker
  - name: tts_worker
    type: core.runtime.workers.TTSWorker
  - name: headless_sink
    type: core.runtime.workers.HeadlessSinkNode
edges:
  - src: llm_worker
    src_port: llm_output
    dst: tts_worker
    dst_port: llm_output
  - src: tts_worker
    src_port: tts_output
    dst: headless_sink
    dst_port: tts_output
exports:
  chat.input:
    node: llm_worker
    port: user_input
    direction: input
  chat.tts_input:
    node: tts_worker
    port: llm_output
    direction: input
  chat.audio_output:
    node: headless_sink
    port: tts_output
    direction: input
  chat.ui_worker:
    node: headless_sink
    direction: node
