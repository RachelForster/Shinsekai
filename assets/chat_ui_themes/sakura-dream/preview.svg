    <text x="32" y="61" fill="#fff8fb" font-size="19">“如果明天醒来，这场梦还没有结束……”</text>
    <text x="32" y="94" fill="#f8dfe7" font-size="17" opacity="0.88">那就再陪我走一会儿吧，直到最后一片樱花落下。</text>
    <circle cx="818" cy="94" r="4" fill="#ffdbe6" />
    <circle cx="832" cy="94" r="2.5" fill="#d4788e" />
