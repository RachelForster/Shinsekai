    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#211429" />
      <stop offset="0.48" stop-color="#5c2f50" />
      <stop offset="1" stop-color="#d4788e" />
    </linearGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="0" y2="1">
